spring:
  application:
    name: bank

  datasource:
    url: jdbc:oracle:thin:@localhost:5500/bank_pdb
    username: bank_user
    password: password
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    user:
      name: admin1
      password: admin1pass

logging:
  level:
    root: warn
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace